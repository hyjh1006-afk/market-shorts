name: daily-shorts

# ── 실행 시간 바꾸는 법 ──────────────────────────────────────
# 아래 cron 줄만 고치면 된다 (GitHub 웹에서 이 파일 열고 연필 아이콘 → 수정 → Commit).
# UTC 기준이라 한국 시간에서 9시간을 빼야 한다:
#   아침 6:00 → "0 21 * * *"   /  6:30 → "30 21 * * *"
#   아침 7:00 → "0 22 * * *"   /  7:30 → "30 22 * * *"
#   아침 8:00 → "0 23 * * *"   /  8:30 → "30 23 * * *"
#   아침 9:00 → "0 0 * * *"
on:
  schedule:
    - cron: "30 22 * * *"   # 매일 07:30 KST (= 22:30 UTC)
  workflow_dispatch: {}      # Actions 탭에서 수동 실행 버튼

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline (collect → video → YouTube upload)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python daily_pipeline.py

      - name: Upload video + log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-${{ github.run_number }}
          path: |
            output/*.mp4
            logs/*.log
          retention-days: 7
