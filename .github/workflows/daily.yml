name: daily-shorts

# ── 업로드 시간 설정 ─────────────────────────────────────────
# schedule.json의 "times" 목록(한국시간, 30분 단위, 최대 6개)에 적힌
# 시각마다 영상을 만들어 유튜브에 올린다.
# 예: {"times": ["07:30", "12:00", "19:30"]}
# 폰 앱(설정 섹션)에서도 바꿀 수 있고, GitHub에서 schedule.json을 직접 고쳐도 된다.

on:
  schedule:
    # 15분 간격 + 혼잡 시각(:00/:30) 회피 — GitHub 스케줄러는 정각·30분 예약을
    # 자주 누락/지연시키므로 비켜난 분에 깨어나 놓친 슬롯을 따라잡는다
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch: {}      # Actions 탭에서 수동 실행 버튼 (시간표 무시하고 즉시 실행)

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.gate.outputs.go }}
    steps:
      - uses: actions/checkout@v5
      - id: gate
        env:
          EVENT: ${{ github.event_name }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: |
          python3 - <<'EOF'
          import json, os, datetime, urllib.request, urllib.parse

          KST = datetime.timezone(datetime.timedelta(hours=9))
          now = datetime.datetime.now(KST)
          slot_now = f"{now.hour:02d}:{now.minute:02d}"
          times = sorted(json.load(open("schedule.json")).get("times", [])[:6])
          # 오늘 지금까지 지나간(예정) 업로드 시각 수
          due = sum(1 for t in times if t <= slot_now)

          def today_uploads():
              """유튜브 API로 '오늘(KST) 실제 업로드된 영상 수'를 센다 (중복 방지)."""
              d = json.loads(os.environ.get("YT_TOKEN_JSON", "") or "{}")
              body = urllib.parse.urlencode({
                  "client_id": d["client_id"], "client_secret": d["client_secret"],
                  "refresh_token": d["refresh_token"], "grant_type": "refresh_token",
              }).encode()
              at = json.loads(urllib.request.urlopen(
                  "https://oauth2.googleapis.com/token", body).read())["access_token"]
              def api(url):
                  req = urllib.request.Request(url, headers={"Authorization": f"Bearer {at}"})
                  return json.loads(urllib.request.urlopen(req).read())
              ch = api("https://www.googleapis.com/youtube/v3/channels?part=contentDetails&mine=true")
              up = ch["items"][0]["contentDetails"]["relatedPlaylists"]["uploads"]
              pl = api(f"https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId={up}&maxResults=25")
              today = now.date().isoformat()
              first_slot = times[0] if times else "00:00"
              cnt = 0
              for it in pl.get("items", []):
                  pub = it["snippet"]["publishedAt"].replace("Z", "+00:00")
                  p = datetime.datetime.fromisoformat(pub).astimezone(KST)
                  # 오늘 첫 슬롯 이전에 올라간 영상은 전날 막차 따라잡기분 → 오늘 집계에서 제외
                  if p.date().isoformat() == today and f"{p.hour:02d}:{p.minute:02d}" >= first_slot:
                      cnt += 1
              return cnt

          if os.environ.get("EVENT") == "workflow_dispatch":
              go, posted = True, -1
          else:
              try:
                  posted = today_uploads()
              except Exception as e:
                  # 확인 실패 시엔 건너뛴다 (중복 업로드 방지 — 다음 체크에서 재시도됨)
                  print("업로드 수 확인 실패 → 이번 체크는 건너뜀:", e)
                  posted = due
              # 지나간 슬롯 수 > 오늘 업로드 수일 때만 (정시 놓쳐도 다음 체크에서 따라잡음)
              go = due > posted
          print(f"KST {slot_now} · times={times} · due={due} · posted={posted} · go={go}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"go={'true' if go else 'false'}\n")
          EOF

  make-and-upload:
    needs: check
    if: needs.check.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline (collect → video → YouTube upload)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python daily_pipeline.py

      - name: Upload video + log as artifact (backup, 2일 보관)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: shorts-${{ github.run_number }}
          path: |
            output/*.mp4
            logs/*.log
          retention-days: 2
