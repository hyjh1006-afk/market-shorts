<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101522">
<title>시장 브리핑 리모컨</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>🎬 시장 브리핑 리모컨</h1>
  <div id="conn" class="badge off">연결 확인 중…</div>
</header>

<main>
  <section class="card">
    <button id="btnDaily" class="big primary">▶ 오늘 영상 만들기<br><small>수집 → AI 영상 생성 (3~4분)</small></button>
    <div class="row">
      <button id="btnCollect">📥 데이터만 수집</button>
      <button id="btnVideo">🎥 영상만 생성</button>
    </div>
    <div id="status" class="status hidden"></div>
  </section>

  <section class="card">
    <h2>📼 만든 영상</h2>
    <div id="videos">불러오는 중…</div>
  </section>

  <section class="card">
    <h2>⚙️ 설정</h2>
    <label>API 주소 (PC의 Wi-Fi IP)</label>
    <div class="row">
      <input id="apiBase" type="url" placeholder="http://192.168.0.10:8788">
      <button id="btnSave">저장</button>
    </div>
    <p class="hint">PC에서 모바일리모컨.bat 실행 시 표시되는 주소를 입력하세요.
       폰과 PC가 같은 Wi-Fi에 있어야 합니다.</p>
  </section>
</main>

<video id="player" class="hidden" controls playsinline></video>

<script src="app.js"></script>
</body>
</html>
